name: Generate Pac-Man contribution animation

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the generated SVG

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          npm run build --workspace packages/github-contributions
          npm run build --workspace packages/grid
          npm run build --workspace packages/svg-creator
          npm run build --workspace packages/action

      - name: Generate SVG
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          USERNAME: ${{ github.repository_owner }}
          OUTPUT_PATH: dist/pacman.svg
        run: node packages/action/dist/index.js

      - name: Push SVG to output branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          cd dist
          git init -b output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pacman.svg
          git commit -m "chore: update pacman animation [skip ci]"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" output:output
