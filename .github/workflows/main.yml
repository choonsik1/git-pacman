name: Generate Pac-Man contribution animation

on:
  schedule:
    # Runs daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push the generated SVG

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: |
          npm run build --workspace packages/github-contributions
          npm run build --workspace packages/grid
          npm run build --workspace packages/svg-creator
          npm run build --workspace packages/action

      - name: Generate SVG
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          USERNAME: AnthonyBSong
          OUTPUT_PATH: dist/pacman.svg
        run: node packages/action/dist/index.js

      - name: Push SVG to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
          commit_message: "chore: update pacman animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
