<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="14" height="14">
  <!-- Pixel art cherry — 14×14 canvas, transparent background -->

  <!-- Stems: fork at top-center, branch down to each berry -->
  <rect x="6"  y="0" width="2" height="1" fill="#3a7d44"/>
  <rect x="5"  y="1" width="1" height="1" fill="#3a7d44"/>
  <rect x="8"  y="1" width="1" height="1" fill="#3a7d44"/>
  <rect x="4"  y="2" width="1" height="1" fill="#3a7d44"/>
  <rect x="9"  y="2" width="1" height="1" fill="#3a7d44"/>
  <rect x="3"  y="3" width="1" height="1" fill="#3a7d44"/>
  <rect x="10" y="3" width="1" height="1" fill="#3a7d44"/>

  <!-- Left berry (cols 1-5, rows 4-8) -->
  <rect x="2"  y="4" width="3" height="1" fill="#cc1100"/>
  <rect x="1"  y="5" width="5" height="3" fill="#cc1100"/>
  <rect x="2"  y="8" width="3" height="1" fill="#cc1100"/>
  <!-- Left berry highlight -->
  <rect x="2"  y="5" width="1" height="1" fill="#ff5555"/>

  <!-- Right berry (cols 8-12, rows 4-8) -->
  <rect x="9"  y="4" width="3" height="1" fill="#cc1100"/>
  <rect x="8"  y="5" width="5" height="3" fill="#cc1100"/>
  <rect x="9"  y="8" width="3" height="1" fill="#cc1100"/>
  <!-- Right berry highlight -->
  <rect x="9"  y="5" width="1" height="1" fill="#ff5555"/>
</svg>
