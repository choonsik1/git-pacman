<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" width="14" height="14">
  <!-- Traced from ghost_right.jpeg — 14×14 pixel art ghost -->
  <!-- Body color: #FF0000 | Facing: right -->

  <!-- Top dome -->
  <rect x="4" y="0" width="6" height="1" fill="#FF0000"/>
  <rect x="3" y="1" width="8" height="1" fill="#FF0000"/>
  <rect x="2" y="2" width="10" height="1" fill="#FF0000"/>
  <rect x="1" y="3" width="12" height="1" fill="#FF0000"/>

  <!-- Eye-row body fill (left edge, middle, right edge) rows 4-7 -->
  <rect x="1"  y="4" width="1" height="4" fill="#FF0000"/>
  <rect x="5"  y="4" width="3" height="4" fill="#FF0000"/>
  <rect x="11" y="4" width="2" height="4" fill="#FF0000"/>

  <!-- Full body rows 8-10 -->
  <rect x="1" y="8" width="12" height="3" fill="#FF0000"/>

  <!-- Skirt: 3 feet bases (row 11) -->
  <rect x="1" y="11" width="3" height="1" fill="#FF0000"/>
  <rect x="5" y="11" width="3" height="1" fill="#FF0000"/>
  <rect x="9" y="11" width="3" height="1" fill="#FF0000"/>

  <!-- Skirt: 3 feet tips (row 12) -->
  <rect x="1" y="12" width="2" height="1" fill="#FF0000"/>
  <rect x="5" y="12" width="2" height="1" fill="#FF0000"/>
  <rect x="9" y="12" width="2" height="1" fill="#FF0000"/>

  <!-- Left eye white -->
  <rect x="2" y="4" width="3" height="4" fill="white"/>
  <!-- Left pupil (1×2, facing right) -->
  <rect x="4" y="6" width="1" height="2" fill="#1a1a1a"/>

  <!-- Right eye white -->
  <rect x="8" y="4" width="3" height="4" fill="white"/>
  <!-- Right pupil (1×2, facing right) -->
  <rect x="10" y="6" width="1" height="2" fill="#1a1a1a"/>
</svg>